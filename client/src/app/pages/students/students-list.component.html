<section class="sg-page">
  <div class="pt-3 pb-5">
    <p-card styleClass="sg-card">
      <ng-template pTemplate="header">
        <div
          class="flex flex-column md:flex-row md:align-items-end md:justify-content-between gap-3 px-4 pt-4 pb-2"
        >
          <div class="sg-title">
            <div class="sg-h1">סטודנטים</div>
            <div class="sg-h2">ניהול פרופילי תלמידים ומעקב אחר ביצועים</div>
          </div>

          <p-button
            label="סטודנט חדש"
            icon="pi pi-plus"
            styleClass="sg-btn-primary"
            (onClick)="navigateToCreate()"
          ></p-button>
        </div>

        <!-- Search + filters row -->
        <div
          class="flex flex-column md:flex-row md:align-items-center gap-3 px-4 pb-2"
        >
          <span class="p-input-icon-right sg-search">
            <i class="pi pi-search" aria-hidden="true"></i>
            <input
              pInputText
              type="text"
              [(ngModel)]="query"
              placeholder="חיפוש לפי שם..."
              aria-label="חיפוש תלמידים"
            />
          </span>

          <p-button
            [label]="filtersOpen ? 'הסתרת סינון' : 'סינון'"
            icon="pi pi-sliders-h"
            [outlined]="true"
            styleClass="sg-btn-secondary"
            (onClick)="toggleFilters()"
            [attr.aria-expanded]="filtersOpen"
            aria-controls="studentsFilters"
          ></p-button>

          <p-button
            label="ייצוא"
            icon="pi pi-download"
            [outlined]="true"
            styleClass="sg-btn-secondary md:mr-auto"
            aria-label="ייצוא"
          ></p-button>
        </div>

        <!-- Collapsible filter panel -->
        <div
          id="studentsFilters"
          class="sg-filter-panel px-4 pb-3"
          *ngIf="filtersOpen"
        >
          <div class="formgrid grid">
            <div class="field col-12 md:col-4">
              <label class="sg-label" for="classFilter">כיתה</label>
              <p-dropdown
                inputId="classFilter"
                [options]="classOptions"
                [(ngModel)]="classFilter"
                optionLabel="label"
                optionValue="value"
                placeholder="כל הכיתות"
                aria-label="סינון לפי כיתה"
              ></p-dropdown>
            </div>
            <div class="field col-12 md:col-4 flex align-items-end">
              <p-button
                label="איפוס"
                [text]="true"
                (onClick)="resetFilters()"
                aria-label="איפוס סינון"
              ></p-button>
            </div>
          </div>
        </div>

        <!-- Active filters -->
        <div
          class="sg-active-filters px-4 pb-3"
          aria-label="מסננים פעילים"
          *ngIf="hasActiveFilters"
        >
          <p-chip
            *ngIf="query.trim()"
            label="שם: {{ query.trim() }}"
            [removable]="true"
            (onRemove)="query = ''"
          ></p-chip>
          <p-chip
            *ngIf="classFilter"
            label="כיתה: {{ classFilter }}"
            [removable]="true"
            (onRemove)="classFilter = null"
          ></p-chip>
        </div>
      </ng-template>

      <!-- Selection toolbar (design only — bulk delete is a future task) -->
      <div
        class="sg-selection-bar"
        *ngIf="selectedStudents.length > 0"
        aria-live="polite"
      >
        <span>נבחרו {{ selectedStudents.length }}</span>
        <p-button
          label="מחיקת נבחרים"
          icon="pi pi-trash"
          severity="danger"
          [text]="true"
          (onClick)="bulkDeleteComingSoon()"
        ></p-button>
        <p-button
          label="ביטול בחירה"
          [text]="true"
          (onClick)="clearSelection()"
        ></p-button>
      </div>

      <div class="sg-table-wrap">
        <p-table
          [value]="filteredStudents"
          [loading]="loading"
          [paginator]="true"
          [rows]="10"
          [rowsPerPageOptions]="[10, 25, 50]"
          dataKey="id"
          [(selection)]="selectedStudents"
          responsiveLayout="scroll"
          styleClass="sg-table"
        >
          <ng-template pTemplate="header">
            <tr>
              <th style="width: 3rem">
                <p-tableHeaderCheckbox
                  aria-label="בחירת כל השורות"
                ></p-tableHeaderCheckbox>
              </th>
              <th>שם התלמיד/ה</th>
              <th class="text-center">כיתה</th>
              <th class="text-center">פעילות</th>
              <th class="text-center" style="width: 5rem">צפייה</th>
              <th class="text-center" style="width: 5rem">פעולות</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-student>
            <tr>
              <td>
                <p-tableCheckbox
                  [value]="student"
                  [attr.aria-label]="'בחירת ' + (student.fullName || '')"
                ></p-tableCheckbox>
              </td>

              <td>
                <div class="font-bold text-color">
                  {{ student.fullName || "—" }}
                </div>
              </td>

              <td class="text-center">
                <p-tag
                  [value]="student.className || '—'"
                  styleClass="sg-class-tag"
                ></p-tag>
              </td>

              <td class="text-center">
                <span class="text-color-secondary" aria-label="פעילות">
                  {{ student.submissionsCount }} הגשות ·
                  {{ student.lessonResultsCount }} תוצאות
                </span>
              </td>

              <td class="text-center">
                <p-button
                  icon="pi pi-eye"
                  [text]="true"
                  pTooltip="צפייה בהגשות"
                  tooltipPosition="top"
                  [attr.aria-label]="
                    'צפייה בהגשות: ' + (student.fullName || '')
                  "
                  (onClick)="viewSubmissions(student.id)"
                ></p-button>
              </td>

              <td class="text-center">
                <p-button
                  icon="pi pi-ellipsis-h"
                  [text]="true"
                  [attr.aria-label]="
                    'פעולות נוספות: ' + (student.fullName || '')
                  "
                  (onClick)="openRowMenu($event, rowMenu, student)"
                ></p-button>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td
                colspan="6"
                class="text-center px-3 py-6 text-color-secondary"
              >
                <div
                  class="flex flex-column align-items-center justify-content-center gap-3"
                >
                  <i class="pi pi-inbox text-4xl" aria-hidden="true"></i>
                  <div>אין סטודנטים להצגה.</div>
                  <p-button
                    label="סטודנט חדש"
                    icon="pi pi-plus"
                    styleClass="sg-btn-primary"
                    (onClick)="navigateToCreate()"
                  ></p-button>
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </p-card>
  </div>
</section>

<p-menu
  #rowMenu
  [popup]="true"
  appendTo="body"
  [model]="rowMenuItems"
  styleClass="sg-row-menu"
></p-menu>

<p-confirmDialog></p-confirmDialog>
